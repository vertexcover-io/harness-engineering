name: Claude Review Fixer

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: claude-pr-comment-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  respond:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude-harness') && github.event.issue.pull_request) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude-harness'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          base_branch: master
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.HARNESS_PAT }}
          plugin_marketplaces: 'https://github.com/vertexcover-io/harness-engineering.git'
          plugins: 'harness@main'
          prompt: |
            You have the harness plugin installed with skills for software engineering workflows.
            When asked to fix review comments or address PR feedback, use /review-fixer.
            Follow the instructions in the @claude-harness comment on this PR.
          show_full_output: true
          claude_args: |
            --model opus
            --effort high
            --max-turns 30
