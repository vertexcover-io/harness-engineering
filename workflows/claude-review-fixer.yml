name: Claude Review Fixer

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: claude-pr-comment-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  respond:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude-harness') && github.event.issue.pull_request) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude-harness'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          base_branch: master
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          plugin_marketplaces: 'https://github.com/vertexcover-io/harness-engineering.git'
          plugins: 'harness@main'
          prompt: |
            Use /review-fixer to address the review feedback below.

            PR #${{ github.event.issue.number || github.event.pull_request.number }}
            Repository: ${{ github.repository }}
            Reviewer: ${{ github.event.comment.user.login }}

            Review body:
            ${{ github.event.comment.body }}

            Fetch the file-level review comments yourself using:
            gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number || github.event.pull_request.number }}/comments
          show_full_output: true
          claude_args: |
            --model opus
            --effort high
            --permission-mode bypassPermissions
