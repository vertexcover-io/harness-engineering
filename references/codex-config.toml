# Harness — Codex config snippet
#
# Merge the relevant blocks into your ~/.codex/config.toml (or <repo>/.codex/config.toml).
# This mirrors the Claude Code settings.json that ships with the plugin.

# Enable plugin-bundled hooks (required for harness/hooks/hooks.json to fire).
[features]
plugin_hooks = true

# Subagent concurrency — orchestrate fans out across phases.
[agents]
max_threads = 6
max_depth = 2
job_max_runtime_seconds = 3000

# Permissive profile matching the Claude Code allow-list.
default_permissions = "harness"

[permissions.harness]
sandbox_mode = "workspace-write"
approval_policy = "on-request"

[permissions.harness.filesystem]
# Workspace-write already covers the repo. Add extras here if needed.

[permissions.harness.network]
# Allow web_search and outbound HTTP for documented integrations.
allow_all = true

# Web search is on by default; uncomment to disable.
# web_search = "disabled"

# Example MCP servers used by harness skills (context7 for library docs, playwright for UI verify).
# Uncomment and configure as needed.
#
# [mcp_servers.context7]
# command = "npx"
# args = ["-y", "@context7/mcp-server"]
#
# [mcp_servers.playwright]
# command = "npx"
# args = ["-y", "@playwright/mcp"]
