[project]
name = "async-worker-app"
version = "0.1.0"
description = "Async background task processor"
requires-python = ">=3.10"

dependencies = [
    "requests>=2.28",
    "flask>=2.0",
    "sqlalchemy>=1.4",
    "celery>=5.0",
    "pydantic>=1.10",
    "boto3>=1.26",
    "redis>=4.0",
    "numpy>=1.23",
    "pillow>=9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "ruff>=0.1.0",
]
