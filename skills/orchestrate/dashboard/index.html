<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orchestrate Dashboard</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@dagrejs/dagre@1.0.2/dist/dagre.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1A1A1A;
      color: #FFFFFF;
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      padding: 0 24px;
      background: #212121;
      flex-shrink: 0;
      border-bottom: 1px solid #2D2D2D;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      color: #FF6B35;
      font-size: 13px;
      font-weight: 600;
    }

    .header-sep {
      color: #3D3D3D;
      font-size: 13px;
    }

    .header-task {
      color: #FFFFFF;
      font-size: 13px;
      max-width: 400px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      background: #2D2D2D;
      color: #999;
    }

    .badge-status {
      color: #0D0D0D;
    }
    .badge-status.running { background: #FF6B35; }
    .badge-status.done { background: #00D4AA; }
    .badge-status.failed { background: #FF4444; }
    .badge-status.interrupted { background: #FFAA00; }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ── DAG Canvas ── */
    #dag-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #dag-svg {
      width: 100%;
      height: 100%;
    }

    /* ── Nodes ── */
    .node rect {
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .node rect:hover { opacity: 0.85; }

    .node-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      fill: #FFFFFF;
      pointer-events: none;
    }

    .node-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      fill: #777;
      pointer-events: none;
    }

    .node-expand {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      fill: #FF6B35;
      cursor: pointer;
    }

    .node-status-dot {
      pointer-events: none;
    }

    /* ── Edges ── */
    .edge path {
      fill: none;
      stroke: #555;
      stroke-width: 1.5;
    }

    .edge marker path {
      fill: #555;
    }

    /* ── Pulse animation ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .node-running rect {
      animation: pulse 2s ease-in-out infinite;
    }

    /* ── Legend ── */
    .legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: #212121;
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 11px;
      z-index: 10;
    }
    .legend-title {
      color: #FF6B35;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    #modal-overlay.visible {
      display: flex;
    }

    #modal {
      background: #212121;
      border-radius: 16px;
      width: min(900px, 90vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 48px;
      background: #2D2D2D;
      flex-shrink: 0;
    }

    .modal-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-title-text {
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
      font-weight: 600;
    }

    .modal-duration {
      color: #777;
      font-size: 11px;
    }

    .modal-close {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #3D3D3D;
      border: none;
      color: #FFF;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover { background: #555; }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    /* ── Markdown rendering ── */
    .modal-body h1 { font-family: 'Oswald', sans-serif; font-size: 24px; font-weight: 700; margin: 0 0 12px; }
    .modal-body h2 { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 600; color: #FF6B35; margin: 16px 0 8px; }
    .modal-body h3 { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 600; color: #FF6B35; margin: 12px 0 6px; }
    .modal-body p { font-size: 13px; line-height: 1.6; margin: 0 0 12px; color: #DDD; }
    .modal-body ul, .modal-body ol { padding-left: 20px; margin: 0 0 12px; }
    .modal-body li { font-size: 13px; line-height: 1.6; color: #DDD; margin: 4px 0; }
    .modal-body code { background: #2D2D2D; padding: 2px 6px; border-radius: 4px; font-size: 12px; color: #FF6B35; }
    .modal-body pre { background: #2D2D2D; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 0 0 12px; }
    .modal-body pre code { background: none; padding: 0; color: #DDD; }
    .modal-body hr { border: none; border-top: 1px solid #3D3D3D; margin: 16px 0; }
    .modal-body blockquote { border-left: 3px solid #FF6B35; padding-left: 12px; color: #999; margin: 0 0 12px; }
    .modal-body table { width: 100%; border-collapse: collapse; margin: 0 0 12px; font-size: 13px; }
    .modal-body th { background: #2D2D2D; padding: 8px; text-align: left; border: 1px solid #3D3D3D; }
    .modal-body td { padding: 8px; border: 1px solid #3D3D3D; color: #DDD; }

    .modal-meta { color: #777; font-size: 12px; }
    .modal-meta dt { font-weight: 600; color: #999; margin-top: 8px; }
    .modal-meta dd { margin-left: 0; margin-top: 2px; }

    /* ── Phase tabs ── */
    .phase-tabs {
      background: #2D2D2D;
      border-radius: 12px;
      padding: 12px 16px;
      margin-top: 16px;
    }
    .phase-tabs-title {
      font-size: 11px;
      font-weight: 600;
      color: #777;
      margin-bottom: 8px;
    }
    .phase-tabs-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .phase-tab {
      padding: 6px 12px;
      border-radius: 8px;
      background: #3D3D3D;
      color: #DDD;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: 'JetBrains Mono', monospace;
      transition: background 0.15s;
    }
    .phase-tab:hover { background: #555; }
    .phase-tab.active {
      background: #FF6B35;
      color: #0D0D0D;
    }
    .modal-back {
      display: inline-block;
      color: #FF6B35;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      border: none;
      background: none;
      font-family: 'JetBrains Mono', monospace;
      padding: 0;
    }
    .modal-back:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header id="header">
    <div class="header-left">
      <span class="header-logo">// orchestrate</span>
      <span class="header-sep">|</span>
      <span class="header-task" id="header-task"></span>
    </div>
    <div class="header-right">
      <div class="badge" id="badge-branch"></div>
      <div class="badge" id="badge-timer"></div>
      <div class="badge badge-status" id="badge-status"></div>
    </div>
  </header>

  <div id="dag-container">
    <svg id="dag-svg">
      <defs>
        <marker id="arrowhead" viewBox="0 0 10 10" refX="10" refY="5"
                markerWidth="8" markerHeight="8" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#555" />
        </marker>
      </defs>
    </svg>

    <div class="legend">
      <div class="legend-title">// status</div>
      <div class="legend-item"><div class="legend-dot" style="background:#00D4AA"></div> done</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FF6B35"></div> running</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3D3D3D; border: 1.5px solid #777"></div> pending</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FF4444"></div> failed</div>
    </div>
  </div>

  <div id="modal-overlay">
    <div id="modal">
      <div class="modal-header">
        <div class="modal-title">
          <span class="modal-title-text" id="modal-title"></span>
          <span class="modal-duration" id="modal-duration"></span>
        </div>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script type="application/json" id="dag-data">{}</script>
  <script type="application/json" id="reports-data">{}</script>

  <script>
    // ── State ──
    let dagData = null;
    let expandedNodes = new Set();
    let pollTimer = null;
    let reportsCache = {};
    let isStatic = false;

    // ── Color map ──
    const STATUS_COLORS = {
      pending:     { border: '#3D3D3D', fill: '#212121' },
      running:     { border: '#FF6B35', fill: '#212121' },
      done:        { border: '#00D4AA', fill: '#212121' },
      failed:      { border: '#FF4444', fill: '#212121' },
      skipped:     { border: '#3D3D3D', fill: '#1A1A1A' },
      interrupted: { border: '#FFAA00', fill: '#212121' },
    };

    const CHILD_FILL = '#2D2D2D';

    // ── Duration formatting ──
    function formatDuration(ms) {
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
    }

    function nodeDuration(node) {
      if (!node.startedAt) return '';
      const start = new Date(node.startedAt).getTime();
      const end = node.completedAt ? new Date(node.completedAt).getTime() : Date.now();
      return formatDuration(end - start);
    }

    // ── Header ──
    var headerTimerInterval = null;

    function renderHeader(meta) {
      document.getElementById('header-task').textContent = meta.task || '';
      document.getElementById('badge-branch').textContent = meta.branch || 'unknown';
      var statusEl = document.getElementById('badge-status');
      statusEl.textContent = (meta.outcome || 'running').toUpperCase();
      statusEl.className = 'badge badge-status ' + (meta.outcome || 'running');

      if (meta.startedAt) {
        var start = new Date(meta.startedAt).getTime();
        var updateTimer = function() {
          var end = meta.completedAt ? new Date(meta.completedAt).getTime() : Date.now();
          document.getElementById('badge-timer').textContent = formatDuration(end - start);
        };
        updateTimer();

        // Clear any previous timer, only start a new one if still running
        if (headerTimerInterval) {
          clearInterval(headerTimerInterval);
          headerTimerInterval = null;
        }
        if (!meta.completedAt) {
          headerTimerInterval = setInterval(updateTimer, 1000);
        }
      }
    }

    // ── Determine visible nodes ──
    function getVisibleNodes(data) {
      var allChildren = new Set();
      Object.values(data.nodes).forEach(function(node) {
        if (node.children) node.children.forEach(function(c) { allChildren.add(c); });
      });

      var visible = new Set();
      Object.keys(data.nodes).forEach(function(id) {
        if (!allChildren.has(id)) visible.add(id);
      });

      expandedNodes.forEach(function(parentId) {
        var parent = data.nodes[parentId];
        if (parent && parent.children) {
          parent.children.forEach(function(c) {
            if (data.nodes[c]) visible.add(c);
          });
        }
      });

      return visible;
    }

    // ── Get visible edges ──
    function getVisibleEdges(data, visibleNodes) {
      return data.edges.filter(function(e) { return visibleNodes.has(e[0]) && visibleNodes.has(e[1]); });
    }

    // ── Constants for manual child layout ──
    var CHILD_NODE_HEIGHT = 40;
    var CHILD_NODE_GAP = 10;
    var CHILD_PAD_TOP = 40;   // space for group label
    var CHILD_PAD_SIDE = 16;
    var CHILD_PAD_BOTTOM = 16;

    // ── Recursive height calculation ──
    // Returns the height a node needs if it's expanded (or CHILD_NODE_HEIGHT if collapsed/leaf)
    function calcNodeHeight(data, nodeId) {
      var node = data.nodes[nodeId];
      if (!node) return CHILD_NODE_HEIGHT;
      var hasKids = node.children && node.children.length > 0;
      if (!hasKids || !expandedNodes.has(nodeId)) return CHILD_NODE_HEIGHT;

      var totalH = CHILD_PAD_TOP;
      node.children.forEach(function(cid, i) {
        if (i > 0) totalH += CHILD_NODE_GAP;
        totalH += calcNodeHeight(data, cid);
      });
      totalH += CHILD_PAD_BOTTOM;
      return totalH;
    }

    // ── Node width calculation ──
    // Accounts for: dot + label + arrow + time + report icon + padding
    function calcSingleNodeWidth(node) {
      if (!node) return 200;
      var hasKids = node.children && node.children.length > 0;
      var hasReport = node.artifacts && node.artifacts.report;
      var dotAndPad = 32;       // status dot + left gap
      var labelW = node.label.length * 8;
      var arrowW = hasKids ? 20 : 0;
      var timeW = 60;           // "00:03:28"
      var reportW = hasReport ? 32 : 0;
      var rightPad = 12;
      return Math.max(200, dotAndPad + labelW + arrowW + timeW + reportW + rightPad);
    }

    // ── Recursive width calculation ──
    // Returns the max width needed by a node and its expanded descendants
    function calcNodeWidth(data, nodeId) {
      var node = data.nodes[nodeId];
      if (!node) return 200;
      var hasKids = node.children && node.children.length > 0;
      if (!hasKids || !expandedNodes.has(nodeId)) return calcSingleNodeWidth(node);

      var maxChildW = 0;
      node.children.forEach(function(cid) {
        var cw = calcNodeWidth(data, cid);
        if (cw > maxChildW) maxChildW = cw;
      });
      return maxChildW + CHILD_PAD_SIDE * 2;
    }

    // ── Recursively position children inside a parent ──
    // Returns array of positioned nodes (with nested children flattened)
    function positionChildren(data, parentId, centerX, topY) {
      var parent = data.nodes[parentId];
      if (!parent || !parent.children) return { nodes: [], groups: [] };

      var allNodes = [];
      var allGroups = [];
      var currentY = topY + CHILD_PAD_TOP;
      var parentW = calcNodeWidth(data, parentId);
      var innerW = parentW - CHILD_PAD_SIDE * 2;

      parent.children.forEach(function(cid, i) {
        var cn = data.nodes[cid];
        if (!cn) return;

        var childH = calcNodeHeight(data, cid);
        var hasKids = cn.children && cn.children.length > 0;
        var isExpanded = hasKids && expandedNodes.has(cid);

        if (isExpanded) {
          // This child is also expanded — draw group box and recurse
          var groupBox = {
            x: centerX - innerW / 2,
            y: currentY,
            width: innerW,
            height: childH
          };
          allGroups.push({ id: cid, box: groupBox, node: cn });

          // Recurse into this child's children
          var nested = positionChildren(data, cid, centerX, currentY);
          nested.nodes.forEach(function(n) { allNodes.push(n); });
          nested.groups.forEach(function(g) { allGroups.push(g); });
        } else {
          // Leaf or collapsed node — position as a regular child node
          allNodes.push({
            id: cid,
            x: centerX,
            y: currentY + childH / 2,
            width: innerW,
            height: childH,
            label: cn.label,
            status: cn.status,
            startedAt: cn.startedAt,
            completedAt: cn.completedAt,
            artifacts: cn.artifacts,
            children: cn.children,
            isChild: true
          });
        }

        currentY += childH + CHILD_NODE_GAP;
      });

      return { nodes: allNodes, groups: allGroups };
    }

    // ── Build dagre graph ──
    function buildGraph(data) {
      var g = new dagre.graphlib.Graph();
      g.setGraph({ rankdir: 'TB', nodesep: 40, ranksep: 60, marginx: 40, marginy: 40 });
      g.setDefaultEdgeLabel(function() { return {}; });

      var visible = getVisibleNodes(data);
      var allChildren = new Set();
      Object.values(data.nodes).forEach(function(node) {
        if (node.children) node.children.forEach(function(c) { allChildren.add(c); });
      });

      // Only 'coder' is the dagre-level expanded parent (children laid out by dagre)
      // All other expanded nodes use recursive manual positioning
      var coderExpanded = expandedNodes.has('coder') && data.nodes['coder'] &&
        data.nodes['coder'].children && data.nodes['coder'].children.length > 0;

      // Collect all manually-expanded nodes (everything except coder)
      var manualExpanded = new Set();
      expandedNodes.forEach(function(id) {
        if (id === 'coder') return;
        var node = data.nodes[id];
        if (node && node.children && node.children.length > 0) {
          manualExpanded.add(id);
        }
      });

      // Collect all nodes that are descendants of manually-expanded parents (at any depth)
      var manualDescendants = new Set();
      function collectDescendants(parentId) {
        var parent = data.nodes[parentId];
        if (!parent || !parent.children) return;
        parent.children.forEach(function(cid) {
          manualDescendants.add(cid);
          if (expandedNodes.has(cid)) collectDescendants(cid);
        });
      }
      manualExpanded.forEach(collectDescendants);

      // Add visible nodes to dagre
      visible.forEach(function(id) {
        if (coderExpanded && id === 'coder') return; // skip coder — drawn as group box
        if (manualDescendants.has(id)) return; // skip — manually positioned

        var node = data.nodes[id];
        var hasKids = node.children && node.children.length > 0;

        // Manually expanded node: add as enlarged node to dagre
        if (manualExpanded.has(id)) {
          var w = calcNodeWidth(data, id);
          var h = calcNodeHeight(data, id);
          g.setNode(id, { label: node.label, width: w, height: h });
          return;
        }

        var width = calcSingleNodeWidth(node);
        var height = allChildren.has(id) ? 40 : 48;
        g.setNode(id, { label: node.label, width: width, height: height });
      });

      // Reroute edges touching coder (if expanded) to first/last dagre child
      var visibleEdges = getVisibleEdges(data, visible);
      var routedEdges = [];
      visibleEdges.forEach(function(e) {
        var from = e[0], to = e[1];

        // Skip edges between manual descendants (not in dagre)
        if (manualDescendants.has(from) || manualDescendants.has(to)) return;

        if (coderExpanded && from === 'coder') {
          var kids = data.nodes['coder'].children.filter(function(c) { return g.hasNode(c); });
          if (kids.length > 0) from = kids[kids.length - 1];
        }
        if (coderExpanded && to === 'coder') {
          var kids2 = data.nodes['coder'].children.filter(function(c) { return g.hasNode(c); });
          if (kids2.length > 0) to = kids2[0];
        }

        if (g.hasNode(from) && g.hasNode(to)) {
          routedEdges.push([from, to]);
          g.setEdge(from, to);
        }
      });

      dagre.layout(g);

      // Compute coder group box from dagre-laid-out children
      var groupBoxes = {};
      if (coderExpanded) {
        var coderNode = data.nodes['coder'];
        var kids = coderNode.children.filter(function(c) { return g.hasNode(c); });
        if (kids.length > 0) {
          var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
          kids.forEach(function(childId) {
            var cn = g.node(childId);
            if (!cn) return;
            minX = Math.min(minX, cn.x - cn.width / 2);
            minY = Math.min(minY, cn.y - cn.height / 2);
            maxX = Math.max(maxX, cn.x + cn.width / 2);
            maxY = Math.max(maxY, cn.y + cn.height / 2);
          });
          var pad = 20;
          groupBoxes['coder'] = {
            x: minX - pad,
            y: minY - CHILD_PAD_TOP,
            width: (maxX - minX) + pad * 2,
            height: (maxY - minY) + CHILD_PAD_TOP + pad
          };
        }
      }

      // Compute manually positioned children recursively
      var manualResults = {}; // parentId → { nodes: [...], groups: [...] }
      manualExpanded.forEach(function(parentId) {
        var gNode = g.node(parentId);
        if (!gNode) return;
        var topY = gNode.y - gNode.height / 2;
        var result = positionChildren(data, parentId, gNode.x, topY);

        // Add the parent itself as a group
        result.groups.unshift({
          id: parentId,
          box: {
            x: gNode.x - gNode.width / 2,
            y: topY,
            width: gNode.width,
            height: gNode.height
          },
          node: data.nodes[parentId]
        });

        manualResults[parentId] = result;
      });

      return {
        graph: g,
        visible: visible,
        routedEdges: routedEdges,
        coderExpanded: coderExpanded,
        manualExpanded: manualExpanded,
        manualDescendants: manualDescendants,
        groupBoxes: groupBoxes,
        manualResults: manualResults
      };
    }

    // ── Zoom state (preserved across renders) ──
    var currentZoom = null;
    var zoomBehavior = null;

    // ── Helper: draw a single node rect + label + status dot ──
    function drawNode(container, d) {
      var colors = STATUS_COLORS[d.status] || STATUS_COLORS.pending;
      var isChild = d.isChild || false;
      var hasKids = d.children && d.children.length > 0;
      var hasReport = d.artifacts && d.artifacts.report;
      var arrow = hasKids ? (expandedNodes.has(d.id) ? ' ▼' : ' ▶') : '';

      var nodeG = container.append('g')
        .attr('class', 'node' + (d.status === 'running' ? ' node-running' : ''))
        .attr('transform', 'translate(' + (d.x - d.width/2) + ',' + (d.y - d.height/2) + ')');

      // Main rect — click toggles expand (if has kids) or opens modal (if leaf)
      nodeG.append('rect')
        .attr('width', d.width)
        .attr('height', d.height)
        .attr('rx', isChild ? 10 : 14)
        .attr('fill', isChild ? CHILD_FILL : colors.fill)
        .attr('stroke', colors.border)
        .attr('stroke-width', 2)
        .style('cursor', 'pointer')
        .on('click', function() { onNodeClick(d); });

      // Status dot
      nodeG.append('circle')
        .attr('class', 'node-status-dot')
        .attr('cx', 16)
        .attr('cy', d.height / 2)
        .attr('r', isChild ? 4 : 5)
        .attr('fill', d.status === 'pending' ? 'transparent' : colors.border)
        .attr('stroke', d.status === 'pending' ? colors.border : 'none')
        .attr('stroke-width', 1.5);

      // Label
      nodeG.append('text')
        .attr('class', 'node-label')
        .attr('x', 32)
        .attr('y', d.height / 2 + 1)
        .attr('dominant-baseline', 'middle')
        .attr('font-size', isChild ? '11px' : '12px')
        .text(d.label + arrow);

      // Time (shift left if report icon present)
      var timeX = hasReport ? d.width - 36 : d.width - 12;
      nodeG.append('text')
        .attr('class', 'node-time')
        .attr('x', timeX)
        .attr('y', d.height / 2 + 1)
        .attr('dominant-baseline', 'middle')
        .attr('text-anchor', 'end')
        .text(nodeDuration(d));

      // Report icon — only shown when node has a report artifact
      if (hasReport) {
        var iconG = nodeG.append('g')
          .attr('class', 'node-report-icon')
          .style('cursor', 'pointer')
          .on('click', function(event) {
            event.stopPropagation();
            openModal(d);
          });

        // Icon background circle
        iconG.append('circle')
          .attr('cx', d.width - 18)
          .attr('cy', d.height / 2)
          .attr('r', 12)
          .attr('fill', '#2D2D2D')
          .attr('stroke', '#555')
          .attr('stroke-width', 1);

        // Document icon (SVG path)
        iconG.append('path')
          .attr('d', 'M-4,-5 L2,-5 L5,-2 L5,5 L-4,5 Z M2,-5 L2,-2 L5,-2')
          .attr('transform', 'translate(' + (d.width - 18) + ',' + (d.height / 2) + ')')
          .attr('fill', 'none')
          .attr('stroke', '#999')
          .attr('stroke-width', 1.2)
          .attr('stroke-linejoin', 'round');
      }
    }

    // ── Helper: draw a group box (dashed border + label) ──
    function drawGroupBox(container, box, dNode) {
      var d = Object.assign({ id: dNode.id || '' }, dNode);
      var borderColor = (STATUS_COLORS[d.status] || STATUS_COLORS.pending).border;

      var grp = container.append('g').attr('class', 'group');
      grp.append('rect')
        .attr('x', box.x)
        .attr('y', box.y)
        .attr('width', box.width)
        .attr('height', box.height)
        .attr('rx', 16)
        .attr('fill', '#1A1A1A')
        .attr('stroke', borderColor)
        .attr('stroke-width', 2)
        .attr('stroke-dasharray', '6,3')
        .style('cursor', 'pointer')
        .on('click', function() { onNodeClick(d); });

      grp.append('text')
        .attr('x', box.x + 16)
        .attr('y', box.y + 22)
        .attr('font-family', "'JetBrains Mono', monospace")
        .attr('font-size', '12px')
        .attr('font-weight', '600')
        .attr('fill', borderColor)
        .style('cursor', 'pointer')
        .text(d.label + ' ▼')
        .on('click', function() { onNodeClick(d); });
    }

    // ── Render DAG ──
    function render(data) {
      dagData = data;
      var result = buildGraph(data);
      var graph = result.graph;
      var visible = result.visible;
      var coderExpanded = result.coderExpanded;
      var manualExpanded = result.manualExpanded;
      var manualDescendants = result.manualDescendants;
      var svg = d3.select('#dag-svg');

      // Set up zoom once
      if (!zoomBehavior) {
        zoomBehavior = d3.zoom()
          .scaleExtent([0.3, 3])
          .on('zoom', function(e) {
            currentZoom = e.transform;
            svg.select('.dag-content').attr('transform', e.transform);
          });
        svg.call(zoomBehavior);
      }

      // Clear and rebuild content layer
      svg.select('.dag-content').remove();
      var container = svg.append('g').attr('class', 'dag-content');

      // Apply zoom
      if (currentZoom) {
        container.attr('transform', currentZoom);
      } else {
        var gInfo = graph.graph();
        var svgEl = svg.node();
        var w = svgEl.clientWidth;
        var h = svgEl.clientHeight;
        var scale = Math.min(w / (gInfo.width + 80), h / (gInfo.height + 80), 1);
        var tx = (w - gInfo.width * scale) / 2;
        var ty = (h - gInfo.height * scale) / 2;
        currentZoom = d3.zoomIdentity.translate(tx, ty).scale(scale);
        svg.call(zoomBehavior.transform, currentZoom);
      }

      // ── 1. Coder group box (behind everything) ──
      var groupBoxes = result.groupBoxes;
      if (coderExpanded && groupBoxes['coder']) {
        drawGroupBox(container, groupBoxes['coder'], Object.assign({ id: 'coder' }, data.nodes['coder']));
      }

      // ── 2. Manually expanded group boxes (recursive) ──
      var manualResults = result.manualResults;
      Object.keys(manualResults).forEach(function(parentId) {
        var res = manualResults[parentId];
        // Draw all group boxes (parent + nested expanded children)
        res.groups.forEach(function(g) {
          drawGroupBox(container, g.box, Object.assign({ id: g.id }, g.node));
        });
      });

      // ── 3. Edges (dagre-level) ──
      var routedEdges = result.routedEdges;
      var line = d3.line().x(function(p) { return p.x; }).y(function(p) { return p.y; }).curve(d3.curveBasis);

      routedEdges.forEach(function(e) {
        var edge = graph.edge(e[0], e[1]);
        if (!edge) return;
        container.append('g').attr('class', 'edge')
          .append('path')
          .attr('d', line(edge.points))
          .attr('marker-end', 'url(#arrowhead)');
      });

      // ── 4. Dagre-laid-out nodes (skip expanded parents and manual descendants) ──
      var allChildren = new Set();
      Object.values(data.nodes).forEach(function(node) {
        if (node.children) node.children.forEach(function(c) { allChildren.add(c); });
      });

      visible.forEach(function(id) {
        if (coderExpanded && id === 'coder') return;
        if (manualExpanded.has(id)) return; // drawn as group box
        if (manualDescendants.has(id)) return; // positioned manually below
        var gNode = graph.node(id);
        if (!gNode) return;
        var dNode = data.nodes[id];
        drawNode(container, Object.assign({ id: id, isChild: allChildren.has(id) }, gNode, dNode));
      });

      // ── 5. Manually positioned children (recursive) ──
      Object.keys(manualResults).forEach(function(parentId) {
        var res = manualResults[parentId];
        var nodes = res.nodes;

        // Draw connecting lines between sibling nodes within each group
        // Group nodes by their direct parent
        var byParent = {};
        // Collect direct children per expanded parent
        function collectDirectChildren(pid) {
          var p = data.nodes[pid];
          if (!p || !p.children) return;
          byParent[pid] = [];
          p.children.forEach(function(cid) {
            // Find the positioned node for this child
            var found = nodes.filter(function(n) { return n.id === cid; });
            if (found.length > 0) {
              byParent[pid].push(found[0]);
            } else {
              // Child is expanded — find its group box center
              var grp = res.groups.filter(function(g) { return g.id === cid; });
              if (grp.length > 0) {
                byParent[pid].push({
                  id: cid,
                  x: grp[0].box.x + grp[0].box.width / 2,
                  y: grp[0].box.y + grp[0].box.height / 2,
                  width: grp[0].box.width,
                  height: grp[0].box.height
                });
                // Recurse
                collectDirectChildren(cid);
              }
            }
          });
        }
        collectDirectChildren(parentId);

        // Draw connecting lines for each group
        Object.keys(byParent).forEach(function(pid) {
          var siblings = byParent[pid];
          for (var i = 0; i < siblings.length - 1; i++) {
            var from = siblings[i];
            var to = siblings[i + 1];
            container.append('g').attr('class', 'edge')
              .append('path')
              .attr('d', line([
                { x: from.x, y: from.y + from.height / 2 },
                { x: to.x, y: to.y - to.height / 2 }
              ]))
              .attr('marker-end', 'url(#arrowhead)');
          }
        });

        // Draw leaf/collapsed child nodes
        nodes.forEach(function(child) {
          drawNode(container, child);
        });
      });
    }

    // ── Node click ──
    function onNodeClick(d) {
      var hasChildren = d.children && d.children.length > 0;

      if (hasChildren) {
        if (expandedNodes.has(d.id)) {
          expandedNodes.delete(d.id);
        } else {
          expandedNodes.add(d.id);
        }
        render(dagData);
        return;
      }

      if (d.status === 'done' || d.status === 'failed') {
        openModal(d);
      }
    }

    // ── Modal ──
    var modalNode = null; // current node being shown
    var modalPhases = []; // additional file paths for tabbed display
    var modalTabsTitle = 'Related Documents'; // title for the tabs section

    function renderMarkdownToBody(body, md) {
      body.replaceChildren();
      var sanitized = DOMPurify.sanitize(marked.parse(md));
      var wrapper = document.createElement('div');
      wrapper.innerHTML = sanitized;
      body.appendChild(wrapper);
    }

    function fetchAndRender(body, path, cacheKey) {
      if (isStatic && reportsCache[cacheKey]) {
        renderMarkdownToBody(body, reportsCache[cacheKey]);
        return;
      }
      if (isStatic) {
        body.textContent = '(Report not available in static mode)';
        return;
      }
      fetch(path + '?t=' + Date.now())
        .then(function(resp) { return resp.ok ? resp.text() : '*(Report file not found)*'; })
        .then(function(text) { renderMarkdownToBody(body, text); })
        .catch(function() { body.textContent = '(Could not load report)'; });
    }

    function buildPhaseTabs(body, phases, activeIndex, tabTitle) {
      var tabsContainer = document.createElement('div');
      tabsContainer.className = 'phase-tabs';

      var title = document.createElement('div');
      title.className = 'phase-tabs-title';
      title.textContent = tabTitle || 'Related Documents';
      tabsContainer.appendChild(title);

      var row = document.createElement('div');
      row.className = 'phase-tabs-row';

      phases.forEach(function(phasePath, i) {
        var btn = document.createElement('button');
        btn.className = 'phase-tab' + (i === activeIndex ? ' active' : '');
        // Extract phase name from filename: "reports/phase-1.md" → "Phase 1"
        var name = phasePath.replace(/.*\//, '').replace('.md', '').replace(/-/g, ' ');
        name = name.charAt(0).toUpperCase() + name.slice(1);
        btn.textContent = name;
        btn.addEventListener('click', function() { showPhase(i); });
        row.appendChild(btn);
      });

      tabsContainer.appendChild(row);
      body.appendChild(tabsContainer);
    }

    function showMainReport() {
      var body = document.getElementById('modal-body');
      var reportPath = modalNode.artifacts && modalNode.artifacts.report;
      if (!reportPath) return;

      fetchAndRender(body, reportPath, modalNode.id);

      // Wait for render, then append tabs
      setTimeout(function() {
        if (modalPhases.length > 0) {
          buildPhaseTabs(body, modalPhases, -1, modalTabsTitle);
        }
      }, 100);
    }

    function showPhase(index) {
      var body = document.getElementById('modal-body');
      body.replaceChildren();

      // Back button
      var back = document.createElement('button');
      back.className = 'modal-back';
      back.textContent = '← Back to Report';
      back.addEventListener('click', showMainReport);
      body.appendChild(back);

      // Phase content container
      var content = document.createElement('div');
      body.appendChild(content);

      var phasePath = modalPhases[index];
      var cacheKey = 'phase-' + index;
      fetchAndRender(content, phasePath, cacheKey);

      // Append tabs after content loads
      setTimeout(function() {
        buildPhaseTabs(body, modalPhases, index, modalTabsTitle);
      }, 100);
    }

    function openModal(node) {
      var overlay = document.getElementById('modal-overlay');
      document.getElementById('modal-title').textContent = node.label;
      document.getElementById('modal-duration').textContent = node.startedAt ? '// completed in ' + nodeDuration(node) : '';
      var body = document.getElementById('modal-body');
      modalNode = node;

      // Check for additional tabbed files (phases for planning, spec for brainstorm, etc.)
      var phasesStr = node.artifacts && node.artifacts.phases;
      modalPhases = phasesStr ? phasesStr.split(',').filter(function(p) { return p.trim(); }) : [];
      modalTabsTitle = (node.artifacts && node.artifacts['tabs-title']) || 'Related Documents';

      var reportPath = node.artifacts && node.artifacts.report;

      if (reportPath) {
        fetchAndRender(body, reportPath, node.id);

        // Append tabs after markdown renders
        if (modalPhases.length > 0) {
          setTimeout(function() {
            buildPhaseTabs(body, modalPhases, -1, modalTabsTitle);
          }, 100);
        }

        overlay.classList.add('visible');
      } else {
        // Show node metadata using safe DOM methods
        body.replaceChildren();
        var dl = document.createElement('dl');
        dl.className = 'modal-meta';

        function addMeta(label, value) {
          var dt = document.createElement('dt');
          dt.textContent = label;
          dl.appendChild(dt);
          var dd = document.createElement('dd');
          dd.textContent = value;
          dl.appendChild(dd);
        }

        addMeta('Status', node.status);
        if (node.startedAt) addMeta('Started', node.startedAt);
        if (node.completedAt) addMeta('Completed', node.completedAt);
        if (node.artifacts && node.artifacts.files) {
          node.artifacts.files.forEach(function(f) { addMeta('File', f); });
        }

        body.appendChild(dl);
        overlay.classList.add('visible');
      }
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('visible');
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', function(e) {
      if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    // ── Polling ──
    function poll() {
      fetch('dag.json?t=' + Date.now())
        .then(function(resp) { if (!resp.ok) throw new Error(); return resp.json(); })
        .then(function(data) {
          renderHeader(data.meta);
          render(data);
          if (data.meta.outcome !== 'running') {
            clearInterval(pollTimer);
            pollTimer = null;
          }
        })
        .catch(function() { /* silently retry on next tick */ });
    }

    // ── Init ──
    function init() {
      var inlinedEl = document.getElementById('dag-data');
      var inlinedData = null;

      try {
        inlinedData = JSON.parse(inlinedEl.textContent);
      } catch(e) { /* empty or invalid */ }

      if (inlinedData && inlinedData.meta && inlinedData.nodes && Object.keys(inlinedData.nodes).length > 0) {
        isStatic = true;
        try {
          reportsCache = JSON.parse(document.getElementById('reports-data').textContent) || {};
        } catch(e) { reportsCache = {}; }
        renderHeader(inlinedData.meta);
        render(inlinedData);
      } else {
        isStatic = false;
        poll();
        pollTimer = setInterval(poll, 2000);
      }
    }

    init();
  </script>
</body>
</html>
