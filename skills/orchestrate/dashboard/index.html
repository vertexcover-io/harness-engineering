<h1>Orchestrate Pipeline Dashboard</h1>
<div id="app"></div>
<script>
async function load() {
  let data = typeof INLINE_DATA !== 'undefined' ? INLINE_DATA : null;
  if (!data) {
    const r = await fetch('/status.json');
    data = await r.json();
  }
  document.getElementById('app').textContent = JSON.stringify(data, null, 2);
}
load();
setInterval(load, 2000);
</script>
